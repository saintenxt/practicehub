services:
  server:
    build:
      context: .
      target: server
    restart: unless-stopped
    environment:
      NODE_ENV: production
    volumes:
      - ./server/uploads:/app/server/uploads
      - ./server/userdata.json:/app/server/userdata.json
      - ./server/matches.json:/app/server/matches.json
      - ./server/messagedata.json:/app/server/messagedata.json
    expose:
      - "3000"

  caddy:
    build:
      context: .
      target: caddy
    restart: unless-stopped
    depends_on:
      - server
    environment:
      CADDY_SITE: "${CADDY_SITE:-wahrwelt.ru, www.wahrwelt.ru}"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
